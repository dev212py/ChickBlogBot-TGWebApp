<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CG Hub — Web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --muted: #6b7280;
      --accent: #0ea5a3;
      --text: #0f1724;
      --border: #e6eef5;
      --modal-bg: #ffffff;
      --modal-text: #0f1724;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --card: #1e293b;
      --muted: #94a3b8;
      --accent: #2dd4bf;
      --text: #f1f5f9;
      --border: #334155;
      --modal-bg: #1e293b;
      --modal-text: #f1f5f9;
    }
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      transition: background 0.2s, color 0.2s;
    }
    .navbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .navbar-brand {
      color: var(--text) !important;
    }
    .card {
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      color: var(--text);
    }
    .btn-primary {
      background: linear-gradient(90deg, #06b6d4, #0ea5a3);
      border: none;
      color: white;
    }
    .btn-outline-light {
      border: 1px solid var(--border);
      color: var(--muted);
      background: transparent;
    }
    .btn-outline-light:hover {
      background: var(--border);
      color: var(--text);
    }
    .form-control, .form-select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(14, 165, 163, 0.08);
      background: var(--card);
      color: var(--text);
    }
    .img-thumb {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .small-muted {
      color: var(--muted);
      font-size: 13px;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #06b6d4, #0ea5a3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      cursor: pointer;
      margin-right: 12px;
    }
    .sidebar {
      position: sticky;
      top: 20px;
    }
    .compose-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #06b6d4, #0ea5a3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 16px;
      transition: 0.2s;
    }
    .post-card {
      margin-bottom: 20px;
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .media-item {
      position: relative;
      aspect-ratio: 1/1;
    }
    .media-item img, .media-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .btn-icon {
      padding: 4px 8px;
    }
    .toast-notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
    }
    .modal-content {
      background: var(--modal-bg);
      color: var(--modal-text);
    }
    .modal-header {
      border-bottom: 1px solid var(--border);
    }
    .modal-footer {
      border-top: 1px solid var(--border);
    }
    [data-theme="dark"] .btn-close {
      filter: invert(1);
    }
    .sync-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 8px;
      background: var(--bg);
      border-radius: 8px;
    }
    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
    }
    .sync-dot.connected {
      background: #10b981;
      animation: pulse 2s infinite;
    }
    .sync-dot.syncing {
      background: #f59e0b;
      animation: spin 1s linear infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>

            <select id="recommendations" class="form-select form-select-sm">

          <div class="mb-2">

        <div class="card p-3 mb-3">

          <div class="text-center mb-3">
            <div id="profileAvatar" class="compose-avatar" style="width:60px;height:60px;font-size:24px;margin:0 auto 12px"></div>

          <button id="btnProfile" class="btn btn-outline-light btn-sm w-100"><i class="fas fa-edit me-1"></i>Изменить ник</button>
        </div>

        <div class="card p-3 small-muted">
          <div><i class="fas fa-info-circle me-2"></i>Инфо</div>
          <div class="mt-2">Авто-модерация изображений (клиент) — отклоняет NSFW. Единая база данных через Telegram Cloud.</div>
          <hr class="my-2">
          <button id="resetDemo" class="btn btn-sm btn-outline-danger w-100"><i class="fas fa-database"></i> Сброс демо (админ)</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>

    async function loadDatabaseFromCloud() {
      try {
        updateSyncStatus('syncing', 'Загрузка базы данных...');
        
        const savedMessageId = localStorage.getItem(DB_MESSAGE_ID_KEY);
        
        if (savedMessageId) {

                chat_id: TELEGRAM_CHAT_ID,
                from_chat_id: TELEGRAM_CHAT_ID,
                message_id: parseInt(savedMessageId)
              })
            });
            
            const data = await response.json();
            
            if (data.ok && data.result.text) {
              const dbData = JSON.parse(data.result.text);
              state.posts = dbData.posts || [];
              state.dbMessageId = savedMessageId;
              updateSyncStatus('connected', 'База загружена');

          } catch (e) {
            console.log('Не удалось загрузить существующую базу');
          }
        }
        
        state.posts = [];
        await saveDatabaseToCloud();
        updateSyncStatus('connected', 'Создана новая база');
        return true;
        
      } catch (e) {
        updateSyncStatus('disconnected', 'Ошибка загрузки');
        return false;
      }
    }

    async function saveDatabaseToCloud() {
      try {
        const dbData = {
          posts: state.posts,
          version: 1,
          updated: Date.now()
        };
        
        const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: JSON.stringify(dbData),
            disable_notification: true
          })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          state.dbMessageId = data.result.message_id;
          localStorage.setItem(DB_MESSAGE_ID_KEY, state.dbMessageId);
          
          const messages = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=-10`);
          const updates = await messages.json();
          
          return true;
        }
        return false;
      } catch (e) {
        return false;
      }
    }

    async function syncWithCloud() {
      if (state.isSyncing) {
        showToast('Синхронизация уже выполняется', 'info');
        return;
      }
      
      state.isSyncing = true;
      updateSyncStatus('syncing', 'Синхронизация...');
      
      try {
        const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?limit=100`);
        const data = await response.json();
        
        if (data.ok && data.result.length > 0) {
          for (const update of data.result) {
            if (update.message && update.message.text && update.message.chat.id.toString() === TELEGRAM_CHAT_ID) {
              try {
                const dbData = JSON.parse(update.message.text);
                if (dbData.posts) {
                  if (!state.dbMessageId || update.message.message_id > state.dbMessageId) {
                    state.posts = dbData.posts;
                    state.dbMessageId = update.message.message_id;
                    localStorage.setItem(DB_MESSAGE_ID_KEY, state.dbMessageId);
                  }
                }
              } catch (e) {}
            }
          }
        }
        
        renderFeed();
        updateUI();
        updateSyncStatus('connected', 'Синхронизировано');
        showToast(`Загружено ${state.posts.length} постов`, 'success');
        
      } catch (e) {
        updateSyncStatus('disconnected', 'Ошибка синхронизации');
        showToast('Ошибка синхронизации', 'error');
      } finally {
        state.isSyncing = false;
      }
    }

    function updateSyncStatus(status, text) {
      const dot = document.getElementById('syncDot');
      const statusText = document.getElementById('syncStatusText');
      const postsCount = document.getElementById('postsCount');
      
      dot.className = 'sync-dot';
      if (status === 'connected') {
        dot.classList.add('connected');
        state.isConnected = true;
      } else if (status === 'syncing') {
        dot.classList.add('syncing');
      } else {
        state.isConnected = false;
      }
      
      statusText.textContent = text;
      postsCount.textContent = `${state.posts.length} постов в базе`;
    }

    function loadUserState() {
      const saved = localStorage.getItem(USER_STATE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          state.user = parsed.user || state.user;
          state.theme = parsed.theme || state.theme;
          state.dbMessageId = parsed.dbMessageId || null;
        } catch (e) {}
      }
    }

    function saveUserState() {
      localStorage.setItem(USER_STATE_KEY, JSON.stringify({
        user: state.user,
        theme: state.theme,
        dbMessageId: state.dbMessageId
      }));
    }

    function showToast(msg, type='info') {
      const container = document.querySelector('.toast-container');
      const toastEl = document.createElement('div');
      toastEl.className = `toast align-items-center text-bg-${type === 'error' ? 'danger' : type === 'success' ? 'success' : 'secondary'} border-0`;
      toastEl.setAttribute('role', 'alert');
      toastEl.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
      container.appendChild(toastEl);
      const toast = new bootstrap.Toast(toastEl);
      toast.show();
      setTimeout(() => toastEl.remove(), 5000);
    }

    function updateUI() {
      document.body.setAttribute('data-theme', state.theme);
      document.getElementById('themeSel').value = state.theme;
      
      const avatarText = state.user.nick.substring(0,2).toUpperCase() || 'CG';
      document.getElementById('composeAvatar').textContent = avatarText;
      document.getElementById('profileAvatar').textContent = avatarText;
      document.getElementById('profileNick').textContent = state.user.nick;
      
      const postCount = state.posts.filter(p => p.nick === state.user.nick).length;
      const totalLikes = state.posts.reduce((sum, p) => sum + (p.likes?.length || 0), 0);
      document.getElementById('profileStats').innerHTML = `Постов: ${postCount}<br>Лайков: ${totalLikes}`;
      
      if (!document.getElementById('nick').value) {
        document.getElementById('nick').value = state.user.nick;
      }
      
      saveUserState();
    }

    async function initNSFW() {
      try {
        state.nsfwModel = await nsfwjs.load();
      } catch (e) {}
    }

    async function checkImageNSFW(file) {
      if (!state.nsfwModel) return false;
      try {
        const img = new Image();
        const url = URL.createObjectURL(file);
        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
        const predictions = await state.nsfwModel.classify(img);
        URL.revokeObjectURL(url);
        const bad = predictions.find(p => (p.className === 'Porn' || p.className === 'Hentai') && p.probability > 0.5);
        return !!bad;
      } catch (e) {
        return false;
      }
    }

    function renderFeed() {
      const feed = document.getElementById('feed');
      const filter = document.getElementById('recommendations').value;
      let posts = state.posts;
      if (filter !== 'all') posts = posts.filter(p => p.type === filter);
      
      posts.sort((a, b) => b.timestamp - a.timestamp);
      
      feed.innerHTML = posts.map(post => {
        const mediaHtml = post.media && post.media.length ? `
          <div class="media-grid">
            ${post.media.map(m => {
              if (m.type === 'image') return `<div class="media-item"><img src="${m.data}" loading="lazy"></div>`;
              if (m.type === 'video') return `<div class="media-item"><video src="${m.data}" controls></video></div>`;
              return '';
            }).join('')}
          </div>
        ` : '';
        
        const likes = post.likes || [];
        const isLiked = likes.includes(state.user.nick);
        const date = new Date(post.timestamp).toLocaleString('ru');
        
        return `
          <div class="card post-card p-3" data-id="${post.id}">
            <div class="d-flex align-items-center mb-2">
              <div class="avatar" style="width:40px;height:40px;font-size:16px;margin-right:12px;">${post.nick.substring(0,2).toUpperCase()}</div>
              <div>
                <div class="fw-bold">${post.nick} <span class="badge bg-secondary ms-2">${post.type}</span></div>
                <div class="small-muted">${date}</div>
              </div>
              ${state.isAdmin ? `<div class="ms-auto"><button class="btn btn-sm btn-outline-danger delete-post" data-id="${post.id}"><i class="fas fa-trash"></i></button></div>` : ''}
            </div>
            <p class="mb-2">${post.content || ''}</p>
            ${mediaHtml}
            <div class="post-actions mt-3">
              <button class="btn btn-sm btn-outline-light like-btn ${isLiked ? 'active' : ''}" data-id="${post.id}">
                <i class="far fa-heart"></i> <span>${likes.length}</span>
              </button>
            </div>
          </div>
        `;
      }).join('');
      
      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = btn.dataset.id;
          const post = state.posts.find(p => p.id === id);
          if (!post) return;
          if (!post.likes) post.likes = [];
          
          const idx = post.likes.indexOf(state.user.nick);
          if (idx === -1) {
            post.likes.push(state.user.nick);
          } else {
            post.likes.splice(idx, 1);
          }
          
          await saveDatabaseToCloud();
          renderFeed();
          updateUI();
        });
      });
      
      if (state.isAdmin) {
        document.querySelectorAll('.delete-post').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = btn.dataset.id;
            state.posts = state.posts.filter(p => p.id !== id);
            await saveDatabaseToCloud();
            renderFeed();
            updateUI();
            updateSyncStatus('connected', 'База обновлена');
            showToast('Пост удален', 'info');
          });
        });
      }
    }

    async function handlePublish() {
      const type = document.getElementById('postType').value;
      const nick = document.getElementById('nick').value.trim() || state.user.nick;
      const content = document.getElementById('content').value.trim();
      const files = document.getElementById('files').files;
      
      if (!content && files.length === 0) {
        showToast('Добавьте текст или медиа', 'error');
        return;
      }
      
      if (nick !== state.user.nick) {
        state.user.nick = nick;
        saveUserState();
      }
      
      let imageCount = 0, videoCount = 0;
      const mediaPromises = [];
      
      for (let file of files) {
        if (file.size > 5 * 1024 * 1024) {
          showToast(`Файл ${file.name} > 5MB`, 'error');
          return;
        }
        if (file.type.startsWith('image/')) imageCount++;
        else if (file.type.startsWith('video/')) videoCount++;
      }
      
      if (type === 'Arts') {
        if (imageCount > 1) { showToast('Арты: только 1 фото', 'error'); return; }
        if (videoCount > 0) { showToast('Арты: видео запрещено', 'error'); return; }
      } else {
        if (imageCount > 10) { showToast('Макс 10 фото', 'error'); return; }
        if (videoCount > 2) { showToast('Макс 2 видео', 'error'); return; }
      }
      
      for (let file of files) {
        if (file.type.startsWith('image/')) {
          const isNSFW = await checkImageNSFW(file);
          if (isNSFW) {
            showToast(`Изображение ${file.name} отклонено (NSFW)`, 'error');
            return;
          }
        }
      }
      
      const media = [];
      for (let file of files) {
        const reader = new FileReader();
        const promise = new Promise((res) => {
          reader.onload = (e) => {
            media.push({ 
              type: file.type.startsWith('image/') ? 'image' : 'video', 
              data: e.target.result 
            });
            res();
          };
        });
        reader.readAsDataURL(file);
        mediaPromises.push(promise);
      }
      
      await Promise.all(mediaPromises);
      
      const newPost = {
        id: Date.now() + '-' + Math.random().toString(36),
        type,
        nick,
        content,
        timestamp: Date.now(),
        media,
        likes: []
      };
      
      state.posts.push(newPost);
      await saveDatabaseToCloud();
      
      document.getElementById('content').value = '';
      document.getElementById('files').value = '';
      document.getElementById('preview').innerHTML = '';
      
      renderFeed();
      updateUI();
      updateSyncStatus('connected', 'Пост опубликован');
      showToast('Опубликовано в общую базу!', 'success');
    }

    function updatePreview() {
      const files = document.getElementById('files').files;
      const previewDiv = document.getElementById('preview');
      previewDiv.innerHTML = '';
      for (let file of files) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const el = file.type.startsWith('image/') 
            ? `<img src="${e.target.result}" class="img-thumb">` 
            : `<video src="${e.target.result}" class="img-thumb" controls></video>`;
          previewDiv.innerHTML += el;
        };
        reader.readAsDataURL(file);
      }
    }

    async function resetDemo() {
      if (!state.isAdmin) {
        showToast('Только для админов', 'error');
        return;
      }
      
      state.posts = [];
      await saveDatabaseToCloud();
      renderFeed();
      updateUI();
      updateSyncStatus('connected', 'База очищена');
      showToast('База данных очищена', 'info');
    }

    window.addEventListener('DOMContentLoaded', async () => {
      loadUserState();
      await initNSFW();
      
      await loadDatabaseFromCloud();
      
      updateUI();
      
      document.querySelectorAll('.modal').forEach(modalEl => {
        modalEl.addEventListener('show.bs.modal', () => {
          const backdrop = document.querySelector('.modal-backdrop');
          if (backdrop) backdrop.remove();
        });
      });
      
      document.getElementById('themeSel').addEventListener('change', (e) => {
        state.theme = e.target.value;
        updateUI();
      });
      
      document.getElementById('btnProfile').addEventListener('click', () => {
        document.getElementById('newNick').value = state.user.nick;
        new bootstrap.Modal(document.getElementById('profileModal')).show();
      });
      
      document.getElementById('saveProfile').addEventListener('click', () => {
        const newNick = document.getElementById('newNick').value.trim();
        if (newNick) {
          state.user.nick = newNick;
          updateUI();
        }
        bootstrap.Modal.getInstance(document.getElementById('profileModal')).hide();
        showToast('Профиль обновлен', 'success');
      });
      
      document.getElementById('btnAdmin').addEventListener('click', () => {
        if (state.isAdmin) {
          state.isAdmin = false;
          showToast('Режим админа выключен', 'info');
          renderFeed();
        } else {
          new bootstrap.Modal(document.getElementById('adminModal')).show();
        }
      });
      
      document.getElementById('admLogin').addEventListener('click', () => {
        const pass = document.getElementById('admPass').value;
        if (verifyAdminPassword(pass)) {
          state.isAdmin = true;
          showToast('Админ-режим активирован', 'success');
          bootstrap.Modal.getInstance(document.getElementById('adminModal')).hide();
          document.getElementById('admPass').value = '';
          renderFeed();
        } else {
          showToast('Неверный пароль', 'error');
        }
      });
      
      document.getElementById('btnSync').addEventListener('click', syncWithCloud);
      document.getElementById('publish').addEventListener('click', handlePublish);
      
      document.getElementById('clearCompose').addEventListener('click', () => {
        document.getElementById('content').value = '';
        document.getElementById('files').value = '';
        document.getElementById('preview').innerHTML = '';
      });
      
      document.getElementById('files').addEventListener('change', updatePreview);
      document.getElementById('recommendations').addEventListener('change', renderFeed);
      document.getElementById('resetDemo').addEventListener('click', resetDemo);
      
      if (!document.getElementById('nick').value) {
        document.getElementById('nick').value = state.user.nick;
      }
      
      setInterval(syncWithCloud, 30000);
    });
  })();
</script>
</body>
</html>
