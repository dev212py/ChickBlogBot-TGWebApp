<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICKEN GUN - Тёмная галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            color: #e0e0e0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
        }

        .glass-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
            padding: 12px 24px;
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #e0e0e0, #9a9a9a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .glass-btn {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .glass-btn:hover {
            background: rgba(60, 60, 60, 0.8);
            transform: translateY(-2px);
        }

        .glass-btn.active {
            background: rgba(80, 80, 80, 0.9);
            border-color: #6b6b6b;
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .icon-btn:hover {
            background: rgba(80, 80, 80, 0.8);
            transform: scale(1.05);
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 24px 40px 24px;
        }

        .content-widget {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-height: 500px;
            max-height: 65vh;
            overflow-y: auto;
            padding: 20px;
        }

        .content-widget::-webkit-scrollbar {
            width: 8px;
        }
        .content-widget::-webkit-scrollbar-track {
            background: rgba(30, 30, 30, 0.5);
            border-radius: 10px;
        }
        .content-widget::-webkit-scrollbar-thumb {
            background: #5a5a5a;
            border-radius: 10px;
        }

        .post-card {
            background: rgba(35, 35, 35, 0.8);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 3px solid #6b6b6b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .post-card:hover {
            background: rgba(45, 45, 45, 0.9);
            transform: translateX(5px);
        }

        .post-title {
            font-size: 20px;
            font-weight: bold;
            color: #d4d4d4;
            margin-bottom: 8px;
        }

        .post-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
        }

        .post-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin: 12px 0;
            cursor: pointer;
            object-fit: cover;
        }

        .post-meta {
            font-size: 12px;
            color: #777;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .delete-post {
            background: rgba(180, 60, 60, 0.6);
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
        }

        .delete-post:hover:not(:disabled) {
            background: rgba(220, 70, 70, 0.9);
        }

        .delete-post:disabled {
            background: rgba(80, 80, 80, 0.5);
            cursor: not-allowed;
        }

        .comments-link {
            color: #9a9a9a;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
        }

        .comments-link:hover {
            color: #ffd966;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #777;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-box {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #4a4a4a;
        }

        .modal-box h3 {
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-box input, .modal-box textarea, .modal-box select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1e1e1e;
            border: 1px solid #4a4a4a;
            color: white;
            border-radius: 12px;
            font-size: 14px;
        }

        .modal-box textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-box label {
            color: #aaa;
            margin-bottom: 5px;
            display: block;
            font-size: 13px;
        }

        .image-preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 12px;
            margin-top: 10px;
            display: none;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-secondary {
            background: #555;
            color: white;
        }

        .comment {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .comment-author {
            color: #ffd966;
            font-size: 13px;
            font-weight: bold;
        }

        .comment-text {
            color: #bbb;
            font-size: 13px;
            margin-top: 5px;
        }

        .add-comment {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .add-comment input {
            flex: 1;
            padding: 10px;
            background: #1e1e1e;
            border: 1px solid #4a4a4a;
            color: white;
            border-radius: 12px;
        }

        .add-comment button {
            background: #4a4a4a;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
        }

        .modal-close {
            background: #6b6b6b;
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="glass-navbar">
    <div class="navbar-container">
        <div class="logo">🔫 CHICKEN GUN</div>
        <div class="nav-buttons" id="categoryButtons">
            <button class="glass-btn" data-cat="arts">🎨 Арты</button>
            <button class="glass-btn" data-cat="buildings">🏗️ Постройки</button>
            <button class="glass-btn" data-cat="concepts">💡 Концепты</button>
        </div>
        <div class="action-buttons">
            <button class="icon-btn" id="addBtn">+</button>
            <button class="icon-btn" id="settingsBtn">⚙️</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="content-widget" id="contentWidget">
        <div class="empty-state">✨ Выберите категорию и добавьте первый пост</div>
    </div>
</div>

<script>
    // ========== ШИФРОВАНИЕ ==========
    const SECRET_KEY = 'cg_secure_key_2026_hwbwcs';
    
    function encrypt(text) {
        if (!text) return '';
        let result = '';
        for (let i = 0; i < text.length; i++) {
            let charCode = text.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length);
            result += String.fromCharCode(charCode);
        }
        return btoa(result);
    }
    
    function decrypt(encrypted) {
        if (!encrypted) return '';
        try {
            let decoded = atob(encrypted);
            let result = '';
            for (let i = 0; i < decoded.length; i++) {
                let charCode = decoded.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length);
                result += String.fromCharCode(charCode);
            }
            return result;
        } catch(e) {
            return '';
        }
    }
    
    // ========== ДАННЫЕ ==========
    let CURRENT_USER = null;
    let currentCategory = 'arts';
    let users = [];
    let contentData = { arts: [], buildings: [], concepts: [] };
    
    // ========== ЗАГРУЗКА/СОХРАНЕНИЕ С ШИФРОВАНИЕМ ==========
    function loadAllData() {
        // Загрузка пользователей (зашифровано)
        let usersEncrypted = localStorage.getItem('cg_users_encrypted');
        if (usersEncrypted) {
            try {
                let usersDecrypted = decrypt(usersEncrypted);
                users = JSON.parse(usersDecrypted);
            } catch(e) { users = []; }
        }
        
        if (!users || users.length === 0) {
            // Создаём админа с ЗАШИФРОВАННЫМ паролем
            users = [{
                id: Date.now(),
                username: 'hwbwcs',
                password: encrypt('20q12w21e'),
                isAdmin: true
            }];
            saveUsers();
        }
        
        // Загрузка постов (зашифровано)
        let postsEncrypted = localStorage.getItem('cg_posts_encrypted');
        if (postsEncrypted) {
            try {
                let postsDecrypted = decrypt(postsEncrypted);
                contentData = JSON.parse(postsDecrypted);
            } catch(e) {}
        }
        if (!contentData.arts) contentData.arts = [];
        if (!contentData.buildings) contentData.buildings = [];
        if (!contentData.concepts) contentData.concepts = [];
        
        // Загрузка сессии (зашифровано)
        let sessionEncrypted = localStorage.getItem('cg_session_encrypted');
        if (sessionEncrypted) {
            try {
                let sessionDecrypted = decrypt(sessionEncrypted);
                let session = JSON.parse(sessionDecrypted);
                if (session && (Date.now() - session.time < 7 * 24 * 3600000)) {
                    let user = users.find(u => u.username === session.username);
                    if (user) {
                        CURRENT_USER = { username: user.username, isAdmin: user.isAdmin };
                    }
                }
            } catch(e) {}
        }
    }
    
    function saveUsers() {
        let usersEncrypted = encrypt(JSON.stringify(users));
        localStorage.setItem('cg_users_encrypted', usersEncrypted);
    }
    
    function savePosts() {
        let postsEncrypted = encrypt(JSON.stringify(contentData));
        localStorage.setItem('cg_posts_encrypted', postsEncrypted);
    }
    
    function saveSession() {
        if (CURRENT_USER) {
            let sessionData = { username: CURRENT_USER.username, time: Date.now() };
            let sessionEncrypted = encrypt(JSON.stringify(sessionData));
            localStorage.setItem('cg_session_encrypted', sessionEncrypted);
        } else {
            localStorage.removeItem('cg_session_encrypted');
        }
    }
    
    function saveAllData() {
        saveUsers();
        savePosts();
        saveSession();
    }
    
    // ========== ПРОВЕРКА ПАРОЛЯ ==========
    function checkPassword(username, password) {
        let user = users.find(u => u.username === username);
        if (!user) return false;
        let decryptedPass = decrypt(user.password);
        return decryptedPass === password;
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    function showAuthModal() {
        let modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>🔐 Вход / Регистрация</h3>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button id="showLoginBtn" style="flex:1; padding:10px; background:#4a4a4a; border:none; border-radius:12px; color:white; cursor:pointer;">Вход</button>
                    <button id="showRegBtn" style="flex:1; padding:10px; background:#3a3a3a; border:none; border-radius:12px; color:white; cursor:pointer;">Регистрация</button>
                </div>
                <div id="loginPanel">
                    <input type="text" id="loginUser" placeholder="Никнейм">
                    <input type="password" id="loginPass" placeholder="Пароль">
                    <div id="loginError" style="color:#ff8888; font-size:12px; margin-bottom:10px;"></div>
                    <button id="doLogin" class="btn-primary" style="width:100%;">Войти</button>
                </div>
                <div id="regPanel" style="display:none;">
                    <input type="text" id="regUser" placeholder="Никнейм (мин 3)">
                    <input type="password" id="regPass" placeholder="Пароль (мин 4)">
                    <input type="password" id="regPass2" placeholder="Повторите пароль">
                    <div id="regError" style="color:#ff8888; font-size:12px; margin-bottom:10px;"></div>
                    <button id="doReg" class="btn-primary" style="width:100%;">Зарегистрироваться</button>
                </div>
                <button id="closeAuth" class="modal-close" style="margin-top:15px;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        let loginPanel = modal.querySelector('#loginPanel');
        let regPanel = modal.querySelector('#regPanel');
        
        modal.querySelector('#showLoginBtn').onclick = () => {
            loginPanel.style.display = 'block';
            regPanel.style.display = 'none';
        };
        modal.querySelector('#showRegBtn').onclick = () => {
            loginPanel.style.display = 'none';
            regPanel.style.display = 'block';
        };
        
        modal.querySelector('#doLogin').onclick = () => {
            let username = modal.querySelector('#loginUser').value.trim();
            let password = modal.querySelector('#loginPass').value;
            
            if (checkPassword(username, password)) {
                let user = users.find(u => u.username === username);
                CURRENT_USER = { username: user.username, isAdmin: user.isAdmin };
                saveAllData();
                modal.remove();
                renderContent();
                updateUI();
            } else {
                modal.querySelector('#loginError').innerText = '❌ Неверный ник или пароль';
            }
        };
        
        modal.querySelector('#doReg').onclick = () => {
            let username = modal.querySelector('#regUser').value.trim();
            let password = modal.querySelector('#regPass').value;
            let password2 = modal.querySelector('#regPass2').value;
            
            if (username.length < 3) { modal.querySelector('#regError').innerText = '❌ Ник минимум 3 символа'; return; }
            if (password.length < 4) { modal.querySelector('#regError').innerText = '❌ Пароль минимум 4 символа'; return; }
            if (password !== password2) { modal.querySelector('#regError').innerText = '❌ Пароли не совпадают'; return; }
            if (users.find(u => u.username === username)) { modal.querySelector('#regError').innerText = '❌ Ник уже занят'; return; }
            
            users.push({
                id: Date.now(),
                username: username,
                password: encrypt(password),
                isAdmin: false
            });
            CURRENT_USER = { username: username, isAdmin: false };
            saveAllData();
            modal.remove();
            renderContent();
            updateUI();
            alert('✅ Регистрация успешна!');
        };
        
        modal.querySelector('#closeAuth').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    function logout() {
        CURRENT_USER = null;
        localStorage.removeItem('cg_session_encrypted');
        renderContent();
        updateUI();
    }
    
    function canDelete(author) {
        if (!CURRENT_USER) return false;
        if (CURRENT_USER.isAdmin) return true;
        return CURRENT_USER.username === author;
    }
    
    // ========== ОТРИСОВКА ==========
    function renderContent() {
        let widget = document.getElementById('contentWidget');
        
        if (!CURRENT_USER) {
            widget.innerHTML = `<div class="empty-state">🔐 Войдите или зарегистрируйтесь<br>Нажмите ⚙️ для входа</div>`;
            return;
        }
        
        let items = contentData[currentCategory];
        if (!items || items.length === 0) {
            widget.innerHTML = `<div class="empty-state">📭 Пусто. Нажмите + чтобы добавить пост!</div>`;
            return;
        }
        
        let html = '';
        for (let item of items) {
            html += `
                <div class="post-card">
                    <div class="post-title">📌 ${escapeHtml(item.title)}</div>
                    <div class="post-desc">${escapeHtml(item.desc)}</div>
                    ${item.image ? `<img src="${item.image}" class="post-image" onclick="event.stopPropagation(); openFullImage('${item.image}')">` : ''}
                    <div class="post-meta">
                        <span>✍️ ${escapeHtml(item.author)} ${item.author === 'hwbwcs' ? '👑' : ''} | 📅 ${item.date}</span>
                        <div>
                            <span class="comments-link" onclick="event.stopPropagation(); openPostModal(${item.id})">💬 ${item.comments?.length || 0} комм.</span>
                            <button class="delete-post" onclick="event.stopPropagation(); deletePost(${item.id})" ${!canDelete(item.author) ? 'disabled' : ''}>🗑 Удалить</button>
                        </div>
                    </div>
                </div>
            `;
        }
        widget.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }
    
    window.deletePost = function(id) {
        let post = contentData[currentCategory].find(p => p.id === id);
        if (!post) return;
        if (!canDelete(post.author)) { alert('⛔ Нельзя удалить чужой пост!'); return; }
        if (confirm('Удалить пост?')) {
            contentData[currentCategory] = contentData[currentCategory].filter(p => p.id !== id);
            savePosts();
            renderContent();
        }
    };
    
    window.openFullImage = function(src) {
        let modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-box" style="text-align:center;"><img src="${src}" style="max-width:100%; max-height:70vh; border-radius:16px;"><button class="modal-close" style="margin-top:20px;" onclick="this.closest('.modal-overlay').remove()">Закрыть</button></div>`;
        document.body.appendChild(modal);
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    };
    
    window.openPostModal = function(id) {
        let post = contentData[currentCategory].find(p => p.id === id);
        if (!post) return;
        
        let modal = document.createElement('div');
        modal.className = 'modal-overlay';
        
        let commentsHtml = '';
        if (post.comments && post.comments.length > 0) {
            for (let c of post.comments) {
                commentsHtml += `<div class="comment"><div class="comment-author">${escapeHtml(c.author)}</div><div class="comment-text">${escapeHtml(c.text)}</div><div style="font-size:10px; color:#666;">${c.date}</div></div>`;
            }
        } else {
            commentsHtml = '<div style="text-align:center; padding:20px; color:#777;">Нет комментариев</div>';
        }
        
        modal.innerHTML = `
            <div class="modal-box">
                <h3>${escapeHtml(post.title)}</h3>
                <div style="color:#aaa;">${escapeHtml(post.desc)}</div>
                ${post.image ? `<img src="${post.image}" style="max-width:100%; border-radius:16px; margin:15px 0; cursor:pointer;" onclick="openFullImage('${post.image}')">` : ''}
                <div style="font-size:12px; color:#777;">✍️ ${escapeHtml(post.author)} | 📅 ${post.date}</div>
                <div class="comments-section" style="margin-top:20px; border-top:1px solid #4a4a4a; padding-top:20px;">
                    <h4>💬 Комментарии (${post.comments?.length || 0})</h4>
                    <div id="commentsList">${commentsHtml}</div>
                    <div class="add-comment">
                        <input type="text" id="commentName" placeholder="Имя" value="${escapeHtml(CURRENT_USER?.username || 'Гость')}">
                        <input type="text" id="commentText" placeholder="Комментарий...">
                        <button onclick="addComment(${id}, '${currentCategory}')">Отправить</button>
                    </div>
                </div>
                <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    };
    
    window.addComment = function(id, category) {
        let modal = document.querySelector('.modal-overlay');
        let name = modal.querySelector('#commentName').value.trim() || 'Гость';
        let text = modal.querySelector('#commentText').value.trim();
        if (!text) { alert('Напишите комментарий'); return; }
        
        let post = contentData[category].find(p => p.id === id);
        if (post) {
            if (!post.comments) post.comments = [];
            post.comments.push({ author: name, text: text, date: new Date().toLocaleString() });
            savePosts();
            openPostModal(id);
        }
    };
    
    // ========== ДОБАВЛЕНИЕ ПОСТА ==========
    function showAddModal() {
    if (!CURRENT_USER) {
        alert('Сначала войдите');
        showAuthModal();
        return;
    }
    
    let modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-box">
            <h3>➕ Новый пост</h3>
            <input type="text" id="postTitle" placeholder="Название">
            <textarea id="postDesc" placeholder="Описание"></textarea>
            <select id="postCat">
                <option value="arts">🎨 Арты</option>
                <option value="buildings">🏗️ Постройки</option>
                <option value="concepts">💡 Концепты</option>
            </select>
            <input type="file" id="postImg" accept="image/*">
            <img id="imgPreview" class="image-preview">
            <div class="modal-buttons">
                <button id="submitPost" class="btn-primary">✅ Опубликовать</button>
                <button id="cancelPost" class="btn-secondary">❌ Отмена</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    
    let imageBase64 = null;
    let fileInput = modal.querySelector('#postImg');
    let preview = modal.querySelector('#imgPreview');
    
    fileInput.onchange = function(e) {
        let file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            if (file.size > 2 * 1024 * 1024) {
                alert('❌ Файл больше 2MB');
                return;
            }
            let reader = new FileReader();
            reader.onload = function(ev) {
                let img = new Image();
                img.onload = function() {
                    let canvas = document.createElement('canvas');
                    let maxW = 800;
                    let w = img.width;
                    let h = img.height;
                    if (w > maxW) {
                        h = (h * maxW) / w;
                        w = maxW;
                    }
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    imageBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    preview.src = imageBase64;
                    preview.style.display = 'block';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };
    
    let submitBtn = modal.querySelector('#submitPost');
    let cancelBtn = modal.querySelector('#cancelPost');
    
    submitBtn.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        let title = modal.querySelector('#postTitle').value.trim();
        let desc = modal.querySelector('#postDesc').value.trim();
        let cat = modal.querySelector('#postCat').value;
        
        if (!title) { 
            alert('Введите название'); 
            return; 
        }
        if (!desc) { 
            alert('Введите описание'); 
            return; 
        }
        
        let newPost = {
            id: Date.now(),
            title: title,
            desc: desc,
            image: imageBase64 || null,
            author: CURRENT_USER.username,
            date: new Date().toLocaleDateString(),
            comments: []
        };
        
        contentData[cat].unshift(newPost);
        savePosts();
        
        if (currentCategory === cat) {
            renderContent();
        }
        modal.remove();
        alert('✅ Пост опубликован!');
    };
    
    cancelBtn.onclick = function(e) {
        e.preventDefault();
        modal.remove();
    };
}
    
    function showSettings() {
        if (!CURRENT_USER) {
            showAuthModal();
            return;
        }
        let total = contentData.arts.length + contentData.buildings.length + contentData.concepts.length;
        alert(`👤 ${CURRENT_USER.username}${CURRENT_USER.isAdmin ? ' (АДМИН)' : ''}\n📊 Всего постов: ${total}\n🎨 Арты: ${contentData.arts.length}\n🏗️ Постройки: ${contentData.buildings.length}\n💡 Концепты: ${contentData.concepts.length}\n\n🔒 Все данные зашифрованы`);
    }
    
    function updateUI() {
        let settingsBtn = document.getElementById('settingsBtn');
        if (CURRENT_USER) {
            settingsBtn.title = CURRENT_USER.username;
        } else {
            settingsBtn.title = 'Войти';
        }
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        loadAllData();
        
        document.querySelectorAll('.glass-btn[data-cat]').forEach(btn => {
            btn.onclick = () => {
                if (!CURRENT_USER) { showAuthModal(); return; }
                currentCategory = btn.getAttribute('data-cat');
                document.querySelectorAll('.glass-btn[data-cat]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderContent();
            };
        });
        
        document.getElementById('addBtn').onclick = showAddModal;
        document.getElementById('settingsBtn').onclick = showSettings;
        
        if (CURRENT_USER) {
            renderContent();
        } else {
            document.getElementById('contentWidget').innerHTML = `<div class="empty-state">🔐 Нажмите ⚙️ для входа</div>`;
        }
        
        document.querySelector('.glass-btn[data-cat="arts"]').classList.add('active');
    }
    
    init();
</script>

</body>
</html>
