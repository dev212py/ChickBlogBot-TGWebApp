<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Технические работы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .maintenance-card {
            background: #242424;
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a3a;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.8;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            color: #a0a0a0;
            margin-bottom: 32px;
        }

        .telegram-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2b5278;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.2s ease;
            border: 1px solid #3a6a9e;
        }

        .telegram-link:hover {
            background: #356694;
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(43, 82, 120, 0.3);
        }

        .telegram-link:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: #666;
        }

        /* Светлая тема (автоматически) */
        @media (prefers-color-scheme: light) {
            body {
                background: #f0f2f5;
                color: #1a1a1a;
            }

            .maintenance-card {
                background: #ffffff;
                border-color: #d0d0d0;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            }

            h1 {
                color: #1a1a1a;
            }

            p {
                color: #555555;
            }

            .footer {
                color: #999;
            }
        }

        /* Адаптив для мобильных */
        @media (max-width: 480px) {
            .maintenance-card {
                padding: 36px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .icon {
                font-size: 56px;
            }

            .telegram-link {
                padding: 12px 20px;
                font-size: 15px;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <div class="icon">🛠️</div>
        <h1>Технические работы</h1>
        <p>
            Мы проводим плановое обновление системы.<br>
            Совсем скоро всё заработает снова.
        </p>
        
        <a href="https://t.me/larperchanol" class="telegram-link" target="_blank" rel="noopener noreferrer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 4px;">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.05-.2-.06-.06-.15-.04-.22-.02-.09.02-1.58 1-4.46 2.95-.42.29-.8.43-1.14.42-.38-.01-1.1-.21-1.64-.39-.66-.21-1.18-.33-1.13-.69.02-.19.29-.38.79-.58 3.06-1.33 5.1-2.21 6.12-2.64 2.91-1.21 3.52-1.42 3.91-1.43.09 0 .28.02.4.12.12.1.15.23.17.33.01.1.02.33 0 .53z"/>
            </svg>
            Быть в курсе в Telegram
        </a>
        
        <div class="footer">
            @larperchanol
        </div>
    </div>
</body>
</html>
