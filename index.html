<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICKEN GUN NEWS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #313131;
            min-height: 100vh;
            flex-direction: column;
            display: flex;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .title {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-size: 128px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            word-break: break-word;
        }

        .description {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #9a9a9a;
            font-size: 32px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: lighter;
            padding: 0 10px;
        }

        .container-1 {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap; /* Позволяет кнопкам переноситься на новую строку */
            gap: 10px;
            margin: 20px 0;
        }

        /* Общий стиль для всех кнопок категорий */
        .category-btn {
            padding: 10px 20px;
            min-height: 47px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: lighter;
            background-color: #313131;
            border: 1px solid #4a4a4a;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap; /* Предотвращает перенос текста внутри кнопки */
        }

        .category-btn:hover {
            background-color: #4a4a4a;
            transform: translateY(-2px);
        }

        .category-btn.active {
            background-color: #6b6b6b;
            border-color: #9a9a9a;
            font-weight: bold;
        }

        /* Убираем фиксированную ширину, делаем её автоматической или через медиа-запросы */
        .category-1, .category-2, .category-3, .category-4 {
            width: auto;
            min-width: 150px;
        }

        /* НОВОСТНОЙ ВИДЖЕТ СО СКРОЛЛОМ */
        .news-widget {
            height: 400px;
            padding: 20px;
            overflow-y: auto;
            color: white;
            border: 1px solid #3d3d3d;
            border-radius: 10px;
            background-color: #2a2a2a;
            margin: 20px 0;
        }

        /* Стилизация скроллбара для виджета */
        .news-widget::-webkit-scrollbar {
            width: 8px;
        }

        .news-widget::-webkit-scrollbar-track {
            background: #3d3d3d;
            border-radius: 10px;
        }

        .news-widget::-webkit-scrollbar-thumb {
            background: #6b6b6b;
            border-radius: 10px;
        }

        .news-widget::-webkit-scrollbar-thumb:hover {
            background: #9a9a9a;
        }

        /* Стили для новостных карточек */
        .news-card {
            background-color: #3d3d3d;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: transform 0.2s;
            word-break: break-word;
        }

        .news-card:hover {
            transform: translateX(5px);
            background-color: #4a4a4a;
        }

        .news-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffd966;
        }

        .news-description {
            font-size: 14px;
            color: #cccccc;
            line-height: 1.4;
        }

        .news-date {
            font-size: 12px;
            color: #9a9a9a;
            margin-top: 8px;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #626262;
            font-size: 32px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: lighter;
            background-color: #313131;
            margin-top: 20px;
            padding: 10px;
        }

        /* ========== АДАПТАЦИЯ ПОД РАЗНЫЕ ЭКРАНЫ ========== */

        /* Планшеты и маленькие ноутбуки (1024px и меньше) */
        @media (max-width: 1024px) {
            .title {
                font-size: 80px;
            }
            
            .description {
                font-size: 24px;
            }
            
            .category-btn {
                font-size: 24px;
                padding: 8px 16px;
            }
            
            .footer {
                font-size: 24px;
            }
        }

        /* Телефоны в горизонтальной ориентации (768px и меньше) */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .title {
                font-size: 56px;
            }
            
            .description {
                font-size: 18px;
            }
            
            .category-btn {
                font-size: 18px;
                padding: 6px 12px;
                min-width: 120px;
            }
            
            .container-1 {
                gap: 8px;
            }
            
            .news-widget {
                height: 350px;
                padding: 15px;
            }
            
            .news-title {
                font-size: 18px;
            }
            
            .news-description {
                font-size: 13px;
            }
            
            .footer {
                font-size: 18px;
            }
        }

        /* Телефоны в вертикальной ориентации (480px и меньше) */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .title {
                font-size: 36px;
            }
            
            .description {
                font-size: 14px;
            }
            
            .category-btn {
                font-size: 14px;
                padding: 5px 10px;
                min-width: 100px;
                white-space: normal; /* Разрешаем перенос текста на маленьких экранах */
                text-align: center;
            }
            
            .container-1 {
                gap: 6px;
            }
            
            .news-widget {
                height: 300px;
                padding: 12px;
            }
            
            .news-card {
                padding: 12px;
                margin-bottom: 12px;
            }
            
            .news-title {
                font-size: 16px;
            }
            
            .news-description {
                font-size: 12px;
            }
            
            .news-date {
                font-size: 10px;
            }
            
            .footer {
                font-size: 14px;
            }
        }

        /* Очень маленькие телефоны (360px и меньше) */
        @media (max-width: 360px) {
            .title {
                font-size: 28px;
            }
            
            .category-btn {
                font-size: 12px;
                padding: 4px 8px;
                min-width: 85px;
            }
            
            .news-widget {
                height: 280px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div class="title">Приветствую!</div>
<div class="description">Рад видеть тебя в новой предложке @chickengunblog!</div>
<div class="description">Исследуй сообщество и делись своими новостями</div>

<div class="container-1">
    <button class="category-btn category-1" data-category="concepts">Концепты</button>
    <button class="category-btn category-2" data-category="builds">Постройки</button>
    <button class="category-btn category-3" data-category="arts">Арты</button>
    <button class="category-btn category-4" id="suggestBtn">Предложить новость</button>
</div>

<!-- НОВОСТНОЙ ВИДЖЕТ СО СКРОЛЛОМ -->
<div class="news-widget" id="newsWidget">
    <!-- Контент будет загружаться сюда динамически -->
</div>

<div class="footer">Сайт создал hwbwcs, приятного использования</div>

<script>
    const newsData = {
        concepts: [
            { title: "Концепт персонажа", description: "дилдо рубящий планеты", date: "2026-01-20" },
            { title: "Концепт ук", description: "костюм скибиди туалета", date: "2026-01-25" },
            { title: "Концепт транспорта", description: "пелемень с крыльями", date: "2026-02-01" },
        ],
        builds: [
            { title: "Космодром", description: "Стартовая площадка для ракет с курицами", date: "2026-02-07" }
        ],
        arts: [
            { title: "Арт: ававывф", description: "гречка2кг", date: "2026-01-12" },
        ]
    };

    // Функция отображения новостей в виджете
    function displayNews(category) {
        const widget = document.getElementById('newsWidget');
        const news = newsData[category];
        
        if (!news || news.length === 0) {
            widget.innerHTML = '<div class="news-card">📭 Новостей пока нет</div>';
            return;
        }
        
        let html = '';
        news.forEach(item => {
            html += `
                <div class="news-card">
                    <div class="news-title">📢 ${escapeHtml(item.title)}</div>
                    <div class="news-description">${escapeHtml(item.description)}</div>
                    <div class="news-date">📅 ${escapeHtml(item.date)}</div>
                </div>
            `;
        });
        
        widget.innerHTML = html;
        widget.scrollTop = 0;
    }

    // Простая защита от XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function setActiveButton(activeBtn) {
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        activeBtn.classList.add('active');
    }
    
    document.querySelectorAll('[data-category]').forEach(button => {
        button.addEventListener('click', () => {
            const category = button.getAttribute('data-category');
            displayNews(category);
            setActiveButton(button);
        });
    });
    
    document.getElementById('suggestBtn').addEventListener('click', () => {
        const newsText = prompt('📝 Введите вашу новость:');
        if (newsText && newsText.trim()) {
            const activeCategory = document.querySelector('.category-btn.active')?.getAttribute('data-category') || 'concepts';
            const newNews = {
                title: "Предложенная новость",
                description: newsText,
                date: new Date().toISOString().split('T')[0]
            };
            if (!newsData[activeCategory]) {
                newsData[activeCategory] = [];
            }
            newsData[activeCategory].unshift(newNews);
            displayNews(activeCategory);
            alert('✅ Спасибо! Новость добавлена!');
        }
    });
    
    // Отображаем концепты по умолчанию
    displayNews('concepts');
    document.querySelector('[data-category="concepts"]').classList.add('active');
</script>

</body>
</html>
