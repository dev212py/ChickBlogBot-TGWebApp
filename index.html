<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Gun Community</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            color: #e0e0e0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
        }

        /* Верхняя стеклянная панель (фиксированная) */
        .glass-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            padding: 12px 24px;
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #e0e0e0, #9a9a9a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        /* Контейнер кнопок категорий */
        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Стеклянные кнопки */
        .glass-btn {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
        }

        .glass-btn:hover {
            background: rgba(60, 60, 60, 0.8);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            color: white;
        }

        .glass-btn.active {
            background: rgba(80, 80, 80, 0.9);
            border-color: #6b6b6b;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* Правая группа кнопок (добавить + настройки) */
        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(80, 80, 80, 0.8);
            transform: scale(1.05);
            color: white;
        }

        /* Основной контент с отступом от фиксированной панели */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 24px 40px 24px;
        }

        /* Виджет со скроллом */
        .content-widget {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-height: 500px;
            max-height: 65vh;
            overflow-y: auto;
            padding: 20px;
            transition: all 0.3s;
        }

        /* Кастомный скроллбар */
        .content-widget::-webkit-scrollbar {
            width: 8px;
        }

        .content-widget::-webkit-scrollbar-track {
            background: rgba(30, 30, 30, 0.5);
            border-radius: 10px;
        }

        .content-widget::-webkit-scrollbar-thumb {
            background: #5a5a5a;
            border-radius: 10px;
        }

        .content-widget::-webkit-scrollbar-thumb:hover {
            background: #7a7a7a;
        }

        /* Карточки контента */
        .content-card {
            background: rgba(35, 35, 35, 0.8);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 3px solid #6b6b6b;
            transition: all 0.2s;
        }

        .content-card:hover {
            background: rgba(45, 45, 45, 0.9);
            transform: translateX(5px);
        }

        .card-title {
            font-size: 20px;
            font-weight: bold;
            color: #d4d4d4;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
        }

        .card-meta {
            font-size: 12px;
            color: #777;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-item {
            background: rgba(180, 60, 60, 0.6);
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }

        .delete-item:hover {
            background: rgba(220, 70, 70, 0.9);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #777;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-box {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #4a4a4a;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-box h3 {
            color: white;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .modal-box input, .modal-box textarea, .modal-box select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1e1e1e;
            border: 1px solid #4a4a4a;
            color: white;
            border-radius: 12px;
            font-size: 14px;
        }

        .modal-box textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-submit {
            background: #4a4a4a;
            color: white;
        }

        .btn-submit:hover {
            background: #6a6a6a;
        }

        .btn-cancel {
            background: #3a3a3a;
            color: #ccc;
        }

        @media (max-width: 768px) {
            .navbar-container {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-buttons, .action-buttons {
                justify-content: center;
            }
            .main-content {
                padding-top: 140px;
            }
            .glass-btn {
                padding: 6px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<!-- Верхняя стеклянная панель -->
<div class="glass-navbar">
    <div class="navbar-container">
        <div class="logo">⚡ CHICKEN GUN</div>
        <div class="nav-buttons" id="categoryButtons">
            <button class="glass-btn" data-cat="arts">🎨 Арты</button>
            <button class="glass-btn" data-cat="buildings">🏗️ Постройки</button>
            <button class="glass-btn" data-cat="concepts">💡 Концепты</button>
        </div>
        <div class="action-buttons">
            <button class="icon-btn" id="addBtn">+</button>
            <button class="icon-btn" id="settingsBtn">⚙️</button>
        </div>
    </div>
</div>

<!-- Основной контент -->
<div class="main-content">
    <div class="content-widget" id="contentWidget">
        <div class="empty-state">✨ Выберите категорию и добавьте первый пост</div>
    </div>
</div>

<script>
    // ========== ДАННЫЕ И ХРАНИЛИЩЕ ==========
    let currentCategory = 'arts';
    let contentData = {
        arts: [],
        buildings: [],
        concepts: []
    };

    // Загрузка данных
    function loadData() {
        const saved = localStorage.getItem('chicken_gun_dark_data');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.arts && parsed.buildings && parsed.concepts) {
                    contentData = parsed;
                }
            } catch(e) {}
        }
        
        // Примеры данных, если пусто
        if (contentData.arts.length === 0) {
            contentData.arts = [
                { id: Date.now(), title: "Курица-киборг", desc: "Лазерные глаза и механические крылья", author: "hwbwcs", date: new Date().toLocaleDateString() },
                { id: Date.now()+1, title: "Тёмный воин", desc: "Арт в мрачных тонах", author: "Artist", date: new Date().toLocaleDateString() }
            ];
        }
        if (contentData.buildings.length === 0) {
            contentData.buildings = [
                { id: Date.now()+2, title: "Крепость Теней", desc: "Неприступная база в горах", author: "Builder", date: new Date().toLocaleDateString() }
            ];
        }
        if (contentData.concepts.length === 0) {
            contentData.concepts = [
                { id: Date.now()+3, title: "Оружие будущего", desc: "Концепт плазменной пушки", author: "Designer", date: new Date().toLocaleDateString() }
            ];
        }
        saveData();
    }

    function saveData() {
        localStorage.setItem('chicken_gun_dark_data', JSON.stringify(contentData));
    }

    // ========== ОТРИСОВКА КОНТЕНТА ==========
    function renderContent() {
        const widget = document.getElementById('contentWidget');
        const items = contentData[currentCategory];
        
        if (!items || items.length === 0) {
            widget.innerHTML = `<div class="empty-state">📭 Пока ничего нет. Нажмите + чтобы добавить!</div>`;
            return;
        }
        
        let html = '';
        for (let item of items) {
            html += `
                <div class="content-card" data-id="${item.id}">
                    <div class="card-title">📌 ${escapeHtml(item.title)}</div>
                    <div class="card-desc">${escapeHtml(item.desc)}</div>
                    <div class="card-meta">
                        <span>✍️ ${escapeHtml(item.author)} | 📅 ${item.date}</span>
                        <button class="delete-item" data-id="${item.id}">🗑 Удалить</button>
                    </div>
                </div>
            `;
        }
        widget.innerHTML = html;
        
        // Навешиваем удаление
        document.querySelectorAll('.delete-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                if (confirm('Удалить этот пост?')) {
                    contentData[currentCategory] = contentData[currentCategory].filter(i => i.id !== id);
                    saveData();
                    renderContent();
                }
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== ДОБАВЛЕНИЕ ==========
    function showAddModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>➕ Добавить пост</h3>
                <input type="text" id="addTitle" placeholder="Название">
                <textarea id="addDesc" placeholder="Описание"></textarea>
                <select id="addCategory">
                    <option value="arts">🎨 Арты</option>
                    <option value="buildings">🏗️ Постройки</option>
                    <option value="concepts">💡 Концепты</option>
                </select>
                <div class="modal-actions">
                    <button class="btn-submit" id="submitAdd">Опубликовать</button>
                    <button class="btn-cancel" id="cancelAdd">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('submitAdd').onclick = () => {
            const title = document.getElementById('addTitle').value.trim();
            const desc = document.getElementById('addDesc').value.trim();
            const cat = document.getElementById('addCategory').value;
            if (!title || !desc) {
                alert('Заполните название и описание');
                return;
            }
            const newItem = {
                id: Date.now(),
                title: title,
                desc: desc,
                author: 'Пользователь',
                date: new Date().toLocaleDateString()
            };
            contentData[cat].unshift(newItem);
            saveData();
            if (currentCategory === cat) renderContent();
            modal.remove();
            alert('✅ Добавлено!');
        };
        
        document.getElementById('cancelAdd').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }

    // ========== НАСТРОЙКИ ==========
    function showSettings() {
        let total = contentData.arts.length + contentData.buildings.length + contentData.concepts.length;
        alert(`⚙️ Статистика\n\n📊 Всего постов: ${total}\n🎨 Арты: ${contentData.arts.length}\n🏗️ Постройки: ${contentData.buildings.length}\n💡 Концепты: ${contentData.concepts.length}\n\n🗑️ Удалять можно любые посты\n💾 Все данные хранятся локально`);
    }

    // ========== ПЕРЕКЛЮЧЕНИЕ КАТЕГОРИЙ ==========
    function setActiveCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.glass-btn[data-cat]').forEach(btn => {
            if (btn.getAttribute('data-cat') === cat) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        renderContent();
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        loadData();
        
        // Назначаем обработчики кнопкам категорий
        document.querySelectorAll('.glass-btn[data-cat]').forEach(btn => {
            btn.addEventListener('click', () => {
                const cat = btn.getAttribute('data-cat');
                setActiveCategory(cat);
            });
        });
        
        document.getElementById('addBtn').onclick = showAddModal;
        document.getElementById('settingsBtn').onclick = showSettings;
        
        // Активируем первую категорию
        setActiveCategory('arts');
    }
    
    init();
</script>

</body>
</html>
